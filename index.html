<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPS P8 Sarjaseuranta 2026</title>
<style>
  :root {
    --green: #00843D; --green-dark: #006830; --green-light: #e8f5ee;
    --black: #121212; --white: #fff; --gray: #f5f5f5; --gray2: #e8e8e8;
    --win: #c8f0d8; --loss: #ffd5d5; --draw: #fff3cc;
    --shadow: 0 2px 16px rgba(0,132,61,.13);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f2;
         color: var(--black); font-size: 15px; }

  /* ── HEADER ── */
  header {
    background: var(--black);
    padding: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .header-top {
    background: var(--green);
    height: 6px;
  }
  .header-content {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 24px;
  }
  .header-logo {
    height: 56px; width: auto;
    filter: brightness(0) invert(1);
  }
  .header-text h1 {
    color: var(--white); font-size: 1.4rem; font-weight: 800;
    letter-spacing: .3px; line-height: 1.2;
  }
  .header-text p {
    color: #aaa; font-size: .82rem; margin-top: 2px;
  }
  .header-badge {
    margin-left: auto;
    background: var(--green); color: #fff;
    border-radius: 20px; padding: 4px 14px;
    font-size: .8rem; font-weight: 700; white-space: nowrap;
  }

  /* ── LAYOUT ── */
  .container { max-width: 960px; margin: 0 auto; padding: 20px 12px 48px; }

  /* ── TABS ── */
  .tabs {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 16px;
  }
  .tab {
    padding: 8px 18px; border-radius: 24px; cursor: pointer;
    font-size: .88rem; font-weight: 700; border: 2px solid var(--gray2);
    background: var(--white); color: #555; transition: all .15s;
  }
  .tab.active { background: var(--green); color: #fff; border-color: var(--green); }
  .tab:hover:not(.active) { border-color: var(--green); color: var(--green); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── CARDS ── */
  .card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden;
  }
  .card-header {
    background: var(--green); color: var(--white);
    padding: 11px 18px; font-weight: 700; font-size: .95rem;
    display: flex; align-items: center; gap: 10px;
  }
  .card-header .sub {
    margin-left: auto; font-size: .78rem; font-weight: 400;
    background: rgba(255,255,255,.2); border-radius: 12px; padding: 2px 10px;
  }

  /* ── SUMMARY TILES ── */
  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 14px; padding: 16px;
  }
  .tile {
    border-radius: 10px; padding: 16px 18px;
    border-left: 5px solid var(--green);
    background: linear-gradient(135deg, var(--green-light) 0%, #fff 100%);
    box-shadow: 0 1px 6px rgba(0,132,61,.1);
  }
  .tile-name { font-weight: 800; color: var(--green-dark); font-size: .95rem; }
  .tile-pos  { font-size: 2.4rem; font-weight: 900; color: var(--green);
               line-height: 1; margin: 4px 0 2px; }
  .tile-pos span { font-size: 1rem; font-weight: 400; color: #666; }
  .tile-sub  { font-size: .78rem; color: #555; margin-top: 2px; }
  .tile-record { font-weight: 700; color: var(--green-dark); margin-top: 3px; font-size: .85rem; }

  /* ── TABLES ── */
  table { width: 100%; border-collapse: collapse; }
  th {
    background: #f0f8f4; color: var(--green-dark); font-weight: 700;
    padding: 8px 10px; text-align: center; font-size: .82rem;
    border-bottom: 2px solid var(--green);
  }
  th.l { text-align: left; }
  td {
    padding: 7px 10px; border-bottom: 1px solid #eef5f1;
    font-size: .88rem; text-align: center;
  }
  td.l { text-align: left; }
  tr:last-child td { border-bottom: none; }
  tr:hover:not(.lps-row) { background: #f8fbf9; }

  /* LPS highlight */
  tr.lps-row { background: #fff9e0 !important; }
  tr.lps-row td { color: var(--green-dark); font-weight: 700; }
  tr.lps-row td.l::after { content: ' ⬅'; font-size: .75rem; color: var(--green); }

  /* Result colours */
  tr.win  { background: var(--win); }
  tr.loss { background: var(--loss); }
  tr.draw { background: var(--draw); }
  tr.upcoming-row { background: #f0f8f4; }

  /* Badges */
  .bv { background: var(--green); color: #fff; border-radius: 4px;
        padding: 1px 7px; font-size: .78rem; font-weight: 700; }
  .bh { background: #e53e3e; color: #fff; border-radius: 4px;
        padding: 1px 7px; font-size: .78rem; font-weight: 700; }
  .bt { background: #d69e2e; color: #fff; border-radius: 4px;
        padding: 1px 7px; font-size: .78rem; font-weight: 700; }

  /* Error */
  .error { background: #ffe0e0; color: #c00; padding: 16px; border-radius: 10px;
           margin: 12px; }
  .loader { text-align: center; padding: 50px; color: #888; font-size: 1rem; }

  /* Footer */
  footer { text-align: center; padding: 16px; color: #999; font-size: .78rem; }
  footer a { color: var(--green); text-decoration: none; }

  @media (max-width: 600px) {
    .header-content { padding: 10px 14px; }
    .header-logo { height: 42px; }
    .header-text h1 { font-size: 1.1rem; }
    .header-badge { display: none; }
    table { font-size: .8rem; }
    td, th { padding: 5px 6px; }
    .tile-pos { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top"></div>
  <div class="header-content">
    <img class="header-logo"
         src="https://laajasalonpalloseura.fi/wp-content/uploads/2021/11/LPS-LOGO-ILMAN-TAUSTAA.png"
         alt="LPS logo">
    <div class="header-text">
      <h1>P8 Sarjaseuranta</h1>
      <p id="update-ts">Ladataan dataa…</p>
    </div>
    <div class="header-badge">Kevät 2026</div>
  </div>
</header>

<div class="container">
  <div id="app"><div class="loader">⏳ Haetaan sarjadataa Palloliiton API:sta…</div></div>
</div>

<footer>
  Data: <a href="https://tulospalvelu.palloliitto.fi" target="_blank">Palloliitto Tulospalvelu</a>
  · Päivittyy automaattisesti joka latauksella ·
  <a href="https://laajasalonpalloseura.fi" target="_blank">laajasalonpalloseura.fi</a>
</footer>

<script>
const BASE   = 'https://palloliitto.torneopal.fi/taso/rest';
const ACCEPT = 'json/df8e84j9xtdz269euy3h';
const PARAM  = 'ysnyp4h6e9egetkc3s3v';
const COMP   = 'etejp26';

const LPS_BY_GROUP = {
  '1': { id:'35156867', name:'LPS',           level:1 },
  '2': { id:'35167112', name:'LPS/Musta',     level:2 },
  '4': { id:'35167113', name:'LPS/Vihreä',    level:3 },
  '7': { id:'35213159', name:'LPS/Valkoinen', level:5 },
};

async function api(ep, params) {
  const r = await fetch(`${BASE}/${ep}?${new URLSearchParams(params)}&${PARAM}`,
                        { headers:{ Accept:ACCEPT } });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function calcStandings(matches) {
  const t = {};
  for (const m of matches) {
    if (m.status!=='Played'||m.competition_id!==COMP) continue;
    const gA=+m.fs_A, gB=+m.fs_B;
    if (isNaN(gA)||isNaN(gB)) continue;
    const add=(id,name)=>{ if(!t[id]) t[id]={id,name,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; };
    add(m.team_A_id,m.team_A_name); add(m.team_B_id,m.team_B_name);
    t[m.team_A_id].p++; t[m.team_A_id].gf+=gA; t[m.team_A_id].ga+=gB;
    t[m.team_B_id].p++; t[m.team_B_id].gf+=gB; t[m.team_B_id].ga+=gA;
    if(gA>gB){t[m.team_A_id].w++;t[m.team_A_id].pts+=3;t[m.team_B_id].l++;}
    else if(gB>gA){t[m.team_B_id].w++;t[m.team_B_id].pts+=3;t[m.team_A_id].l++;}
    else{t[m.team_A_id].d++;t[m.team_A_id].pts++;t[m.team_B_id].d++;t[m.team_B_id].pts++;}
  }
  return Object.values(t)
    .sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf)
    .map((x,i)=>({...x,pos:i+1,gd:x.gf-x.ga}));
}

function lpsMat(matches, id) {
  return matches
    .filter(m=>m.competition_id===COMP&&(m.team_A_id===id||m.team_B_id===id))
    .map(m=>{
      const h=m.team_A_id===id;
      let res='-',out='-';
      if(m.status==='Played'&&m.fs_A!==''){
        const gL=h?+m.fs_A:+m.fs_B, gO=h?+m.fs_B:+m.fs_A;
        res=`${gL}–${gO}`; out=gL>gO?'V':gL<gO?'H':'T';
      }
      return { date:m.date, time:(m.time||'').slice(0,5),
               home:h, opp:h?m.team_B_name:m.team_A_name,
               oppId:h?m.team_B_id:m.team_A_id,
               res, out, status:m.status, venue:m.venue_name||'' };
    }).sort((a,b)=>a.date.localeCompare(b.date));
}

const fd = s => s ? s.split('-').reverse().join('.') : '';

function stTable(standings, lpsId) {
  const rows = standings.map(t=>{
    const L=t.id===lpsId;
    return `<tr class="${L?'lps-row':''}">
      <td>${t.pos}</td><td class="l">${t.name}</td>
      <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td>${t.gf}–${t.ga}</td><td>${t.gd>0?'+'+t.gd:t.gd}</td>
      <td><strong>${t.pts}</strong></td>
    </tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>#</th><th class="l">Joukkue</th>
    <th>P</th><th>V</th><th>T</th><th>H</th>
    <th>Maalit</th><th>ME</th><th>Pts</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function matchBadge(out) {
  return out==='V'?'<span class="bv">V</span>'
        :out==='H'?'<span class="bh">H</span>'
        :out==='T'?'<span class="bt">T</span>':'';
}

async function main() {
  try {
    const today = new Date().toISOString().slice(0,10);
    const groups = {};

    await Promise.all(Object.entries(LPS_BY_GROUP).map(async([gid,info])=>{
      const d = await api('getGroup',{competition_id:COMP,category_id:'P8',group_id:gid,matches:1});
      const matches = d.group.matches||[];
      const standings = calcStandings(matches);
      groups[gid] = { info, standings, matches,
                      oppPos:Object.fromEntries(standings.map(t=>[t.id,t.pos])),
                      groupName:d.group.group_name };
    }));

    // ── Tiles ──────────────────────────────────────────────────────────────
    const tiles = Object.entries(LPS_BY_GROUP)
      .sort(([,a],[,b])=>a.level-b.level)
      .map(([gid,info])=>{
        const g=groups[gid], t=g.standings.find(x=>x.id===info.id);
        if (!t) return '';
        return `<div class="tile">
          <div class="tile-name">${info.name}</div>
          <div class="tile-pos">${t.pos}<span>/${g.standings.length}</span></div>
          <div class="tile-record">${t.w}V ${t.d}T ${t.l}H &nbsp;·&nbsp; ${t.gf}–${t.ga}</div>
          <div class="tile-sub">Taso ${info.level} &nbsp;·&nbsp; ${t.pts} pistettä &nbsp;·&nbsp; ${t.p} peliä</div>
        </div>`;
      }).join('');

    // ── Upcoming ───────────────────────────────────────────────────────────
    const allUp = [];
    for (const [gid,info] of Object.entries(LPS_BY_GROUP)) {
      const g=groups[gid];
      lpsMat(g.matches,info.id)
        .filter(m=>m.status!=='Played'&&m.date>=today)
        .forEach(m=>allUp.push({...m,team:info.name,level:info.level,oppPos:g.oppPos}));
    }
    allUp.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));

    const upRows = allUp.slice(0,20).map(m=>{
      const op=m.oppPos[m.oppId];
      return `<tr class="upcoming-row">
        <td class="l"><strong>${m.team}</strong></td>
        <td>${fd(m.date)}</td><td>${m.time}</td>
        <td>${m.home?'🏠 Koti':'✈ Vieras'}</td>
        <td class="l">${m.opp}${op?` <small style="color:#888">(#${op})</small>`:''}</td>
        <td class="l" style="font-size:.78rem;color:#777">${m.venue}</td>
      </tr>`;
    }).join('');

    // ── Per-level tabs ─────────────────────────────────────────────────────
    const levelTabs = Object.entries(LPS_BY_GROUP)
      .sort(([,a],[,b])=>a.level-b.level)
      .map(([gid,info],i)=>{
        const g=groups[gid];
        const ms=lpsMat(g.matches,info.id);
        const mRows=ms.map(m=>{
          const f=m.status!=='Played';
          const cls=f?'upcoming-row':m.out==='V'?'win':m.out==='H'?'loss':m.out==='T'?'draw':'';
          return `<tr class="${cls}">
            <td>${fd(m.date)}</td><td>${m.time}</td>
            <td>${m.home?'🏠':'✈'}</td>
            <td class="l">${m.opp}</td>
            <td>${m.res} ${matchBadge(m.out)}</td>
            <td class="l" style="font-size:.77rem;color:#777">${m.venue}</td>
          </tr>`;
        }).join('');
        return `<div class="tab-content" id="tab-${i+1}">
          <div class="card">
            <div class="card-header">📊 ${g.groupName} — Sarjataulukko
              <span class="sub">${g.standings.length} joukkuetta</span>
            </div>
            ${stTable(g.standings, info.id)}
          </div>
          <div class="card">
            <div class="card-header">📅 ${info.name} — Otteluohjelma & tulokset</div>
            <table><thead><tr>
              <th>Pvm</th><th>Klo</th><th>K/V</th>
              <th class="l">Vastustaja</th><th>Tulos</th><th class="l">Paikka</th>
            </tr></thead><tbody>${mRows}</tbody></table>
          </div>
        </div>`;
      }).join('');

    // ── All results ────────────────────────────────────────────────────────
    const allPlayed=[];
    for(const[gid,info] of Object.entries(LPS_BY_GROUP)){
      lpsMat(groups[gid].matches,info.id)
        .filter(m=>m.status==='Played')
        .forEach(m=>allPlayed.push({...m,team:info.name,level:info.level}));
    }
    allPlayed.sort((a,b)=>b.date.localeCompare(a.date));
    const allRows=allPlayed.map(m=>`<tr class="${m.out==='V'?'win':m.out==='H'?'loss':'draw'}">
      <td class="l"><strong>${m.team}</strong></td><td>Taso ${m.level}</td>
      <td>${fd(m.date)}</td><td>${m.home?'🏠':'✈'}</td>
      <td class="l">${m.opp}</td><td><strong>${m.res}</strong> ${matchBadge(m.out)}</td>
    </tr>`).join('');

    const now=new Date().toLocaleString('fi-FI');
    document.getElementById('update-ts').textContent=`Päivitetty ${now}`;

    const tabLabels=['Yhteenveto','Taso 1','Taso 2','Taso 3','Taso 5','Kaikki tulokset'];
    const tabHtml=tabLabels.map((l,i)=>
      `<div class="tab${i===0?' active':''}" onclick="sw(${i})">${l}</div>`).join('');

    document.getElementById('app').innerHTML=`
      <div class="tabs">${tabHtml}</div>
      <div class="tab-content active" id="tab-0">
        <div class="card">
          <div class="card-header">🏆 LPS-joukkueiden sijoitukset</div>
          <div class="summary-grid">${tiles}</div>
        </div>
        <div class="card">
          <div class="card-header">📅 Seuraavat pelit
            <span class="sub">${allUp.length} tulossa</span>
          </div>
          <table><thead><tr>
            <th class="l">Joukkue</th><th>Pvm</th><th>Klo</th>
            <th>K/V</th><th class="l">Vastustaja</th><th class="l">Paikka</th>
          </tr></thead><tbody>${upRows}</tbody></table>
        </div>
      </div>
      ${levelTabs}
      <div class="tab-content" id="tab-5">
        <div class="card">
          <div class="card-header">📋 Kaikki pelatut ottelut</div>
          <table><thead><tr>
            <th class="l">Joukkue</th><th>Taso</th><th>Pvm</th>
            <th>K/V</th><th class="l">Vastustaja</th><th>Tulos</th>
          </tr></thead><tbody>${allRows}</tbody></table>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('app').innerHTML=
      `<div class="error">⚠️ Virhe: ${e.message}<br><small>Päivitä sivu.</small></div>`;
  }
}

function sw(i) {
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.tab-content').forEach((t,j)=>t.classList.toggle('active',i===j));
}

main();
</script>
</body>
</html>
